services:
  db:
    image: postgres:16
    container_name: pismo_db
    environment:
      POSTGRES_USER: pismousr
      POSTGRES_PASSWORD: pismopass
      POSTGRES_DB: pismodb
    ports:
      - "5768:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: