services:
  db:
    image: postgres:16-alpine
    container_name: pismo_db
    environment:
      POSTGRES_USER: ${DB_USER:-pismousr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pismopass}
      POSTGRES_DB: ${DB_NAME:-pismodb}
    ports:
      - "5768:5432" 
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pismousr} -d ${DB_NAME:-pismodb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pismo_app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      DB_HOST: db    
      DB_PORT: 5432  
      DB_USER: ${DB_USER:-pismousr}
      DB_PASSWORD: ${DB_PASSWORD:-pismopass}
      DB_NAME: ${DB_NAME:-pismodb}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: